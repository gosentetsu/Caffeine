name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Build Release
        run: |
          xcodebuild \
            -project caffeine.xcodeproj \
            -scheme caffeine \
            -configuration Release \
            -derivedDataPath ./build \
            MACOSX_DEPLOYMENT_TARGET=14.0 \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Verify App
        run: |
          APP_PATH="./build/Build/Products/Release/Caffeine.app"
          echo "Checking $APP_PATH ..."
          ls -la "$APP_PATH/Contents/MacOS/"
          file "$APP_PATH/Contents/MacOS/"*

      - name: Create DMG
        run: |
          brew install create-dmg
          APP_PATH="./build/Build/Products/Release/Caffeine.app"
          DMG_PATH="Caffeine.dmg"
          # 只放 Caffeine.app 到暂存目录，避免镜像里混入多余文件
          STAGE="dmg-stage"
          rm -rf "$STAGE" && mkdir -p "$STAGE"
          cp -R "$APP_PATH" "$STAGE/"
          # 生成带「拖入 Applications」窗口的 DMG（左侧 app，右侧 Applications 快捷方式）
          # create-dmg 偶尔会因设置卷图标返回非 0，但镜像已生成，故用 || test 兜底
          create-dmg \
            --volname "Caffeine" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 120 \
            --icon "Caffeine.app" 165 200 \
            --hide-extension "Caffeine.app" \
            --app-drop-link 495 200 \
            "$DMG_PATH" \
            "$STAGE" \
            || test -f "$DMG_PATH"

      - name: Generate Checksum
        run: shasum -a 256 Caffeine.dmg > Caffeine.dmg.sha256

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Caffeine.dmg
          path: |
            Caffeine.dmg
            Caffeine.dmg.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: Caffeine.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Caffeine.dmg
            Caffeine.dmg.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
