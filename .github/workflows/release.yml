name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Build Release
        run: |
          xcodebuild \
            -project caffeine.xcodeproj \
            -scheme caffeine \
            -configuration Release \
            -derivedDataPath ./build \
            MACOSX_DEPLOYMENT_TARGET=14.0 \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Verify App
        run: |
          APP_PATH="./build/Build/Products/Release/caffeine.app"
          echo "Checking $APP_PATH ..."
          ls -la "$APP_PATH/Contents/MacOS/"
          file "$APP_PATH/Contents/MacOS/"*

      - name: Create DMG
        run: |
          APP_PATH="./build/Build/Products/Release/caffeine.app"
          DMG_PATH="Caffeine.dmg"
          hdiutil create -volname "Caffeine" -srcfolder "$APP_PATH" -ov -format UDZO "$DMG_PATH"

      - name: Generate Checksum
        run: shasum -a 256 Caffeine.dmg > Caffeine.dmg.sha256

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Caffeine.dmg
          path: |
            Caffeine.dmg
            Caffeine.dmg.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: Caffeine.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Caffeine.dmg
            Caffeine.dmg.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
